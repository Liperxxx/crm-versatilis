# 
# CONFIGURAÇÃO PARA PRODUÇÃO
# 
spring.application.name=CRM Versatilis
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/api

# 
# BANCO DE DADOS - PRODUÇÃO (Supabase PostgreSQL via Pooler IPv4)
# 
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://aws-1-us-east-1.pooler.supabase.com:6543/postgres?sslmode=require&pgbouncer=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres.sqtttloncpfqysssrvyr}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.maximum-pool-size=15
spring.datasource.hikari.minimum-idle=3
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.initialization-fail-timeout=-1

# 
# JPA/HIBERNATE - PRODUÇÃO
# 
spring.jpa.hibernate.ddl-auto=update
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true

# 
# JWT - PRODUÇÃO
# 
jwt.secret=${JWT_SECRET:changeme-insecure-default-replace-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# 
# AMBIENTE
# 
app.environment=production
app.debug=false

# 
# CORS - PRODUÇÃO
# 
app.cors.allowed-origins=${ALLOWED_ORIGINS:https://crm-versatilis.vercel.app,https://crm-versatilis-k7b5r51gi-bustechs-projects.vercel.app,https://*.vercel.app,https://crm-versatilis-production.up.railway.app}

# 
# EMAIL SMTP
# 
# Email via Resend API (https://resend.com)
resend.api.key=${RESEND_API_KEY:}
mail.from=${MAIL_FROM:contato@versatilis.ind.br}

# 
# LOGGING - PRODUÇÃO
# 
logging.level.root=WARN
logging.level.com.versatilis.crm=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.boot.web.embedded.tomcat=INFO
logging.level.org.apache.catalina=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# 
# ACTUATOR - PRODUÇÃO
# 
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always