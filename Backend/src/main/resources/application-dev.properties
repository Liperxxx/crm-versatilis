#
# PERFIL DEV — H2 em memória (sem dependência do Supabase)
#
spring.application.name=CRM Versatilis (DEV)

# H2 Database (modo PostgreSQL para compatibilidade)
spring.datasource.url=jdbc:h2:mem:crmdev;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;MODE=PostgreSQL
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

# H2 Console (acesse em http://localhost:8081/api/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=false

# JPA — criar tabelas automaticamente via entidades
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

# HikariCP
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.connection-timeout=10000

# Desabilitar init de schema.sql
spring.sql.init.mode=never

# Ambiente
app.environment=development
app.debug=true

# Logging
logging.level.root=INFO
logging.level.com.versatilis.crm=DEBUG