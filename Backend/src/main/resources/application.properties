# 
# CONFIGURAÇÃO GERAL DA APLICAÇÃO
# 
spring.application.name=CRM Versatilis
server.port=${PORT:8080}
server.address=0.0.0.0
server.servlet.context-path=/api
spring.profiles.active=${SPRING_PROFILES_ACTIVE:prod}

# 
# CONFIGURAÇÃO DE BANCO DE DADOS (Supabase — conexão direta IPv6)
# 
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://db.sqtttloncpfqysssrvyr.supabase.co:5432/postgres?sslmode=require}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver

# 
# CONFIGURAÇÃO HIKARICP (limite de conexões para Supabase free tier)
# 
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.initialization-fail-timeout=-1

# 
# CONFIGURAÇÃO JPA/HIBERNATE
# 
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# 
# CONFIGURAÇÃO JWT
# 
jwt.secret=${JWT_SECRET:changeme-insecure-default-replace-in-production}
jwt.expiration=${JWT_EXPIRATION:86400000}

# 
# CONFIGURAÇÃO DE AMBIENTE
# 
app.environment=${APP_ENVIRONMENT:development}
app.debug=${APP_DEBUG:false}
app.cors.allowed-origins=${ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5500,https://crm-versatilis.vercel.app,https://crm-versatilis-k7b5r51gi-bustechs-projects.vercel.app}

# 
# TEMPLATE DE ORÇAMENTO (DOCX)
# 
app.orcamento.template-path=${ORC_TEMPLATE_PATH:templates/orcamento.docx}

# 
# SUPABASE STORAGE
# 
supabase.url=${SUPABASE_URL:https://sqtttloncpfqysssrvyr.supabase.co}
supabase.service-key=${SUPABASE_SERVICE_KEY:}

# 
# FILE UPLOAD
# 
spring.servlet.multipart.max-file-size=5MB
spring.servlet.multipart.max-request-size=5MB

# 
# EMAIL SMTP
# 
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:contato@versatilis.ind.br}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# 
# LOGGING - detalhado para diagnóstico
# 
logging.level.root=INFO
logging.level.com.versatilis.crm=DEBUG
logging.level.org.springframework.boot=INFO
logging.level.org.springframework.boot.web.embedded.tomcat=INFO
logging.level.org.apache.catalina=INFO
logging.level.org.springframework.web=INFO
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n

# 
# ACTUATOR - path relativo ao context-path /api → /api/actuator/health
# 
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always
management.endpoints.web.base-path=/actuator