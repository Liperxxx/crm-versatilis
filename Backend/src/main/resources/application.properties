# 
# CONFIGURAÇÃO GERAL DA APLICAÇÃO
# 
spring.application.name=CRM Versatilis
server.port=8081
server.servlet.context-path=/api

# 
# CONFIGURAÇÃO DE BANCO DE DADOS (Supabase — conexão direta IPv6)
# Requer IPv6 nativo. Inicie com: -Djava.net.preferIPv6Addresses=true
# 
spring.datasource.url=jdbc:postgresql://db.sqtttloncpfqysssrvyr.supabase.co:5432/postgres?sslmode=require
spring.datasource.username=postgres
spring.datasource.password=versatilis1234
spring.datasource.driver-class-name=org.postgresql.Driver

# 
# CONFIGURAÇÃO HIKARICP (limite de conexões para Supabase free tier)
# 
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=300000
spring.datasource.hikari.max-lifetime=600000
spring.datasource.hikari.initialization-fail-timeout=-1

# 
# CONFIGURAÇÃO JPA/HIBERNATE
# 
spring.jpa.hibernate.ddl-auto=none
spring.sql.init.mode=never
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.boot.allow_jdbc_metadata_access=false

# 
# CONFIGURAÇÃO JWT
# 
jwt.secret=${JWT_SECRET:sua_chave_secreta_muito_segura_aqui_com_minimo_256_bits_e_mais_de_32_caracteres_para_HS512}
jwt.expiration=${JWT_EXPIRATION:86400000}

# 
# CONFIGURAÇÃO DE AMBIENTE
# 
app.environment=${APP_ENVIRONMENT:development}
app.debug=${APP_DEBUG:false}

# 
# TEMPLATE DE ORÇAMENTO (DOCX)
# Coloque seu arquivo .docx em Backend/src/main/resources/templates/orcamento.docx
# Ou configure um caminho absoluto abaixo, ex: C:/templates/orcamento.docx
# Placeholders de texto: {{NUMERO}} {{DATA_EMISSAO}} {{DATA_VALIDADE}} {{STATUS}}
#   {{CLIENTE_NOME}} {{CLIENTE_CNPJ}} {{CLIENTE_ENDERECO}} {{CLIENTE_CIDADE_ESTADO}}
#   {{CLIENTE_EMAIL}} {{CLIENTE_TELEFONE}} {{OPORTUNIDADE}} {{RESPONSAVEL}}
#   {{SUBTOTAL}} {{DESCONTO}} {{TOTAL}} {{OBSERVACOES}} {{RODAPE}}
# Linha de tabela de itens: {{ITEM_NUM}} {{ITEM_DESC}} {{ITEM_QTD}} {{ITEM_VALOR_UNIT}} {{ITEM_TOTAL}}
# 
app.orcamento.template-path=${ORC_TEMPLATE_PATH:templates/orcamento.docx}

# 
# EMAIL SMTP (Gmail — use uma Senha de App, não a senha real da conta)
# Gere em: https://myaccount.google.com/apppasswords
# 
spring.mail.host=${MAIL_HOST:smtp.gmail.com}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:contato@versatilis.ind.br}
spring.mail.password=${MAIL_PASSWORD:@Versatilis123#}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.debug=false

# 
# LOGGING
# 
logging.level.root=INFO
logging.level.com.versatilis.crm=DEBUG
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n